<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <title>CG Exam - เฉลยแยกพาร์ท</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        
        .part-section { margin-bottom: 50px; padding: 20px; border: 1px solid #e0e0e0; border-radius: 12px; background: #fff; }
        .part-header { background: #1a73e8; color: white; padding: 12px; margin: -20px -20px 20px -20px; border-radius: 10px 10px 0 0; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; }
        
        .q-box { margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px; transition: 0.3s; }
        .q-title { font-weight: bold; margin-bottom: 10px; display: block; }
        .options { display: flex; flex-direction: column; gap: 8px; }
        label { padding: 10px; border: 1px solid #f0f0f0; border-radius: 6px; cursor: pointer; }
        label:hover { background: #f8f9fa; }
        input[type="radio"] { margin-right: 10px; }

        /* การแสดงผลเฉลย */
        .wrong-box { border: 2px solid #d32f2f; background-color: #fff8f8; }
        .correct-box { border: 2px solid #2e7d32; background-color: #f1f8f1; }
        .explanation { display: none; margin-top: 10px; padding: 12px; border-radius: 6px; background-color: #fdecea; color: #c62828; border-left: 5px solid #d32f2f; font-size: 0.9rem; }
        .show-explanation { display: block; }
        .correct-mark { color: #2e7d32; font-weight: bold; display: none; margin-left: 10px; }

        .btn-check-part { background: #34a853; color: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-check-part:hover { background: #2d8e47; }
        .part-score { font-weight: bold; color: #1a73e8; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Computer Graphics Final Quiz</h1>
    <p style="text-align:center;">ทำทีละพาร์ท และกดตรวจเพื่อดูเฉลยข้อที่ผิดในพาร์ทนั้นๆ</p>

    <div class="part-section" id="section-1">
        <div class="part-header">
            <span>PART 1: Transformation (1-20)</span>
            <span id="score-text-1"></span>
        </div>
        <div id="q-container-1"></div>
        <button class="btn-check-part" onclick="checkPart(1, 0, 20)">ตรวจคำตอบ PART 1</button>
    </div>

    <div class="part-section" id="section-2">
        <div class="part-header">
            <span>PART 2: Viewing & Projection (21-40)</span>
            <span id="score-text-2"></span>
        </div>
        <div id="q-container-2"></div>
        <button class="btn-check-part" onclick="checkPart(2, 20, 40)">ตรวจคำตอบ PART 2</button>
    </div>

    <div class="part-section" id="section-3">
        <div class="part-header">
            <span>PART 3: Lighting & Shading (41-60)</span>
            <span id="score-text-3"></span>
        </div>
        <div id="q-container-3"></div>
        <button class="btn-check-part" onclick="checkPart(3, 40, 60)">ตรวจคำตอบ PART 3</button>
    </div>
</div>

function initQuiz() {
    quizData.forEach((item, i) => {
        let containerId = (i < 20) ? "q-container-1" : (i < 40 ? "q-container-2" : "q-container-3");
        const container = document.getElementById(containerId);
        
        const optionsHTML = item.opt.map((o, idx) => {
            const char = ["ก", "ข", "ค", "ง"][idx];
            return `<label><input type="radio" name="q${i}" value="${char}"> ${o}</label>`;
        }).join('');

        container.innerHTML += `
            <div class="q-box" id="qbox-${i}">
                <span class="q-title">${i+1}. ${item.q} <span id="mark-${i}" class="correct-mark">✓</span></span>
                <div class="options">${optionsHTML}</div>
                <div id="exp-${i}" class="explanation"></div>
            </div>
        `;
    });
}

function checkPart(partNum, start, end) {
    let partScore = 0;
    for (let i = start; i < end; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const box = document.getElementById(`qbox-${i}`);
        const exp = document.getElementById(`exp-${i}`);
        const mark = document.getElementById(`mark-${i}`);

        // Reset
        box.classList.remove('wrong-box', 'correct-box');
        exp.classList.remove('show-explanation');
        mark.style.display = 'none';

        if (selected) {
            if (selected.value === quizData[i].a) {
                partScore++;
                box.classList.add('correct-box');
                mark.style.display = 'inline';
            } else {
                box.classList.add('wrong-box');
                exp.classList.add('show-explanation');
                exp.innerHTML = `<strong>เฉลย: ข้อ ${quizData[i].a}</strong> | ${quizData[i].hint}`;
            }
        } else {
            box.classList.add('wrong-box');
            exp.classList.add('show-explanation');
            exp.innerHTML = `<strong>ยังไม่ได้ตอบ!</strong> (เฉลยคือ ${quizData[i].a})`;
        }
    }
    document.getElementById(`score-text-${partNum}`).innerText = `คะแนนพาร์ทนี้: ${partScore} / 20`;
}

initQuiz();
</script>
</body>
</html>
